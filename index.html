<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app-container">
    <h1 class="title">Todo List</h1>

    <!-- 📅 주간 네비게이션 -->
    <div class="week-header">
      <button id="prevWeekBtn">◀</button>
      <span id="weekRangeText"></span>
      <button id="nextWeekBtn">▶</button>
    </div>

    <!-- 📆 주간 뷰 -->
    <div id="weekView" class="week-view"></div>

    <!-- 입력 -->
    <div class="input-section">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />
      <button id="addButton">추가</button>
    </div>

    <p id="errorMessage" class="error-message"></p>

    <!-- 필터 -->
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">전체</button>
      <button class="tab" data-filter="active">진행 중</button>
      <button class="tab" data-filter="completed">완료</button>
    </div>

    <!-- 리스트 -->
    <ul id="todoList" class="todo-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
